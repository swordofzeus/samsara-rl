site_name: samsara-rl
repo_url: https://github.com/swordofzeus/samsara-rl
site_url: https://swordofzeus.github.io/samsara-rl
site_description: This is a template repository for Python projects that use uv for their dependency management.
site_author: Ashish Juneja
edit_uri: edit/main/docs/
repo_name: swordofzeus/samsara-rl
copyright: Maintained by <a href="https://swordofzeus.com">swordofzeus</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/samsara_rl"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/swordofzeus/samsara-rl
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/samsara-rl

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
